<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Reso-Calm</title>
    <style>
        /* Import Google Font - Inter */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');

        :root {
            --primary-bg: #1A1A2E;
            --text-color: #E0E0E0;
            --accent-blue-purple: #8D9EFF;
            --accent-sage-green: #7AA874;
            --accent-light-cream: #D6E6F2;
            --secondary-bg: #2A2A4A;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Hide overflow from animations */
            position: relative;
        }

        .content {
            z-index: 10; /* Ensure text is above animations */
            text-align: center;
            position: relative; /* Needed for z-index to work against sibling animated circles */
        }

        h1 {
            font-size: 4em; /* Larger on desktop */
            font-weight: 500;
            margin: 0;
            padding: 0;
            line-height: 1;
        }

        /* Responsive font size for H1 */
        @media (max-width: 768px) {
            h1 {
                font-size: 3em;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.5em;
            }
        }

        /* Soft Circular Animations */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%); /* Subtle gradient for soft glow */
            filter: blur(8px); /* Soft blur */
            animation: floatAndFade 15s infinite ease-in-out alternate;
            opacity: 0; /* Start hidden */
            z-index: 1;
        }

        /* Specific circle styles for varied appearance */
        .circle:nth-child(1) {
            width: 150px;
            height: 150px;
            background-color: var(--accent-blue-purple);
            top: 10%;
            left: 5%;
            animation-delay: 0s;
            animation-duration: 18s;
        }

        .circle:nth-child(2) {
            width: 200px;
            height: 200px;
            background-color: var(--accent-sage-green);
            bottom: 15%;
            right: 10%;
            animation-delay: 3s;
            animation-duration: 20s;
        }

        .circle:nth-child(3) {
            width: 100px;
            height: 100px;
            background-color: var(--accent-light-cream);
            top: 20%;
            right: 20%;
            animation-delay: 6s;
            animation-duration: 16s;
        }

        .circle:nth-child(4) {
            width: 180px;
            height: 180px;
            background-color: var(--accent-blue-purple);
            bottom: 5%;
            left: 20%;
            animation-delay: 9s;
            animation-duration: 22s;
        }

        .circle:nth-child(5) {
            width: 120px;
            height: 120px;
            background-color: var(--accent-sage-green);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Center this specific circle */
            animation-delay: 12s;
            animation-duration: 19s;
        }

        /* Animation Keyframes */
        @keyframes floatAndFade {
            0% {
                transform: translateY(0) scale(1) translateX(0) rotate(0deg);
                opacity: 0.1;
            }
            25% {
                transform: translateY(-20px) scale(1.05) translateX(10px) rotate(5deg);
                opacity: 0.2;
            }
            50% {
                transform: translateY(0) scale(1.1) translateX(0) rotate(0deg);
                opacity: 0.15;
            }
            75% {
                transform: translateY(20px) scale(1.05) translateX(-10px) rotate(-5deg);
                opacity: 0.2;
            }
            100% {
                transform: translateY(0) scale(1) translateX(0) rotate(0deg);
                opacity: 0.1;
            }
        }
    </style>
</head>
<body>
    <div class="background-animations">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    <div class="content">
        <h1>Hello World</h1>
    </div>
</body>
</html>
